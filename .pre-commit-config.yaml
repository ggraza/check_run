exclude: 'node_modules|.git'
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: 'check_run.*'
        exclude: '.*json$|.*txt$|.*csv|.*md|.*svg'
      - id: no-commit-to-branch
        args: ['--branch', 'version-15']
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: ['--py310-plus']

  - repo: https://github.com/agritheory/black
    rev: 951ccf4d5bb0d692b457a5ebc4215d755618eb68
    hooks:
      - id: black
        args: ['--line-length', '99']

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier -w . --config .prettierrc.js --ignore-path .prettierignore
        language: system

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args: [--remove-all-unused-imports, --in-place]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
        additional_dependencies: ['flake8-bugbear']

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: ['-L delink']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        exclude: ^tests/
        args: ['--install-types', '--non-interactive', '--ignore-missing-imports']

  - repo: local
    hooks:
      - id: validate_customizations
        always_run: true
        name: .github/validate_customizations.py
        entry: python .github/validate_customizations.py
        language: system
        types: [python]

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
